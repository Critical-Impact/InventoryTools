name: Test

on:
  workflow_dispatch:
  push:
    branches:
      - inventory-scopes

env:
  INTERNAL_NAME: InventoryToolsTesting
  CONFIGURATION: Release
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  download-exd:
    runs-on: ubuntu-latest
    steps:
      - name: Retrieve cache
        uses: actions/cache@v4
        with:
          path: exd-data
          # Use the .cachemeta.json file to invalidate the cache when the data changes.
          key: exd-files-data-${{hashFiles('exd-data/.cachemeta.json')}}
          restore-keys: |
            exd-files-data-
      - name: Download EXD Files
        uses: WorkingRobot/ffxiv-downloader@v7
        with:
          output-path: exd-data
          regex: '^sqpack\/ffxiv\/0a0000\..+$'
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1.3
      - name: Download Dalamud
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev\"
      - name: Restore
        run: dotnet restore InventoryTools
      - name: Run tests
        run: dotnet test  -c ${{ env.CONFIGURATION }} --no-restore ${{ env.INTERNAL_NAME }} --logger "junit;LogFilePath=test-results.xml"
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml
      - name: Publish GitHub Test Report
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: test-results.xml

